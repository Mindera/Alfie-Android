query ProductListQuery(
    $collectionHandle: String!,
    $after: String,
    $filters: ProductFilterInput,
    $sort: ProductSortEnum! = NEWEST,
    $limit: Int! = 25,
    $platform: String
) {
    productList(
        collectionHandle: $collectionHandle,
        after: $after,
        filters: $filters,
        sort: $sort,
        limit: $limit,
        platform: $platform
    ) {
        pageInfo {
            endCursor
            hasNextPage
        }
        totalCount
        products {
            ...ProductListEntryFragment
        }
    }
}
