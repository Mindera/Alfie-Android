query ProductListQuery(
    $collectionHandle: String!,
    $after: String,
    $filters: ProductFilterInput,
    $sort: ProductSortEnum! = NEWEST,
    $limit: Int! = 25,
    $platform: String
) {
    productList(
        collectionHandle: $collectionHandle,
        after: $after,
        filters: $filters,
        sort: $sort,
        limit: $limit,
        platform: $platform
    ) {
        ...ProductListResponseFragment
    }
}

query SearchProductsQuery(
    $searchTerm: String!,
    $after: String,
    $filters: ProductFilterInput,
    $sort: ProductSortEnum! = NEWEST,
    $limit: Int! = 25,
    $platform: String
) {
    searchProducts(
        searchTerm: $searchTerm,
        after: $after,
        filters: $filters,
        sort: $sort,
        limit: $limit,
        platform: $platform
    ) {
        ...ProductListResponseFragment
    }
}
