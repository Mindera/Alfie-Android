name: PR Validation and Firebase Deployment

on:
  push:
    branches:
      - main

jobs:
  setup_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Ruby
        uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
        with:
          ruby-version: 3.3
          bundler-cache: true

      - name: Install Dependencies
        run: |
          gem install bundler
          bundle install

      - name: Set Firebase Credentials
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_DISTRIBUTOR_KEY }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "FIREBASE_APP_ID=${FIREBASE_APP_ID}" >> $GITHUB_ENV
          echo "${FIREBASE_CREDENTIALS}" > fastlane/firebase_login_credentials.json
          echo "${GOOGLE_SERVICES_JSON}" > app/src/google-services.json

      - name: Set Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD }}
        run: |
          mkdir -p "$HOME/app"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$HOME/app/alfie.keystore"
          echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> $GITHUB_ENV
          echo "ANDROID_KEYSTORE_ALIAS=$ANDROID_KEYSTORE_ALIAS" >> $GITHUB_ENV
          echo "ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD=$ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD" >> $GITHUB_ENV

      - name: Run Fastlane
        run: bundle exec fastlane deploy_beta